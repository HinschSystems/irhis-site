<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — I Rent Houses In Sweats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito Sans', Arial, sans-serif;
      background: #0b2c3d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 44px 40px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
    }

    .logo {
      display: block;
      height: 44px;
      margin: 0 auto 28px;
    }

    h1 {
      color: #0b2c3d;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 28px;
    }

    label {
      display: block;
      color: #0b2c3d;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #dde3e3;
      border-radius: 8px;
      font-family: 'Nunito Sans', Arial, sans-serif;
      font-size: 15px;
      color: #0b2c3d;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #C4775A; }

    button {
      width: 100%;
      padding: 14px;
      background: #C4775A;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Nunito Sans', Arial, sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }

    button:hover:not(:disabled) { background: #ad6249; }
    button:disabled { background: #c8c8c8; cursor: not-allowed; }

    .error {
      background: #fff2f0;
      border: 1.5px solid #f5c0b5;
      color: #b83c28;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .bottom-links {
      text-align: center;
      margin-top: 22px;
      font-size: 14px;
      color: #888;
    }

    .bottom-links a {
      color: #C4775A;
      font-weight: 700;
      text-decoration: none;
    }

    .bottom-links a:hover { text-decoration: underline; }

    .divider {
      color: #ccc;
      margin: 0 8px;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px 32px; }
    }
  </style>
</head>
<body>

<div class="card">
  <img class="logo"
    src="https://assets.cdn.filesafe.space/Ju2En80bdsSebpKgHpJT/media/f5959204-7bf4-415e-a80a-cc75312b2ddb.png"
    alt="I Rent Houses In Sweats"
    onerror="this.style.display='none'">

  <h1>Sign In</h1>

  <div class="error" id="error-msg"></div>

  <label for="email">Email Address</label>
  <input type="email" id="email" placeholder="you@email.com" autocomplete="email">

  <label for="password">Password</label>
  <input type="password" id="password" placeholder="Your password" autocomplete="current-password">

  <button id="submit-btn" onclick="handleLogin()">Sign In</button>

  <div class="bottom-links">
    <a href="/forgot-password">Forgot password?</a>
    <span class="divider">|</span>
    Need an account? Contact Neela
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://dzhdwremvptmtacvmxlq.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6aGR3cmVtdnB0bXRhY3ZteGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NDg2MDgsImV4cCI6MjA5ODUyNDYwOH0.xb_yw_w3AIpzn-cVZTm_1iqY-IE99oJxSnaa6jMExDQ';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  // If already logged in, go straight to dashboard
  db.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = '/dashboard';
  });

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('submit-btn');

    document.getElementById('error-msg').style.display = 'none';

    if (!email || !password) {
      showError('Please enter your email and password.'); return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';

    const { error } = await db.auth.signInWithPassword({ email, password });

    if (error) {
      showError('Invalid email or password. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }

    window.location.href = '/dashboard';
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
